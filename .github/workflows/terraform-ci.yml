name: Terraform CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/aws-lab/**"
      - ".github/workflows/terraform-ci.yml"

  push:
    branches:
      - main
    paths:
      - "terraform/aws-lab/**"
      - ".github/workflows/terraform-ci.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  terraform-format:
    name: Terraform Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform/aws-lab

  terraform-validate:
    name: Validate ${{ matrix.stack }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        include:
          - stack: bootstrap-remote-state
            working_directory: terraform/aws-lab/bootstrap/remote-state

          - stack: lab-network
            working_directory: terraform/aws-lab/envs/lab/network

          - stack: lab-compute
            working_directory: terraform/aws-lab/envs/lab/compute

          - stack: lab-storage
            working_directory: terraform/aws-lab/envs/lab/storage

          - stack: lab-finops
            working_directory: terraform/aws-lab/envs/lab/finops

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform without remote backend
        working-directory: ${{ matrix.working_directory }}
        run: terraform init -backend=false -input=false

      - name: Validate Terraform configuration
        working-directory: ${{ matrix.working_directory }}
        run: terraform validate

  terraform-finops-plan:
    name: Plan lab-finops
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    env:
      TF_IN_AUTOMATION: true
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_budget_name: ${{ vars.FINOPS_BUDGET_NAME }}
      TF_VAR_budget_limit_amount: ${{ vars.FINOPS_BUDGET_LIMIT }}
      TF_VAR_notification_email: ${{ secrets.FINOPS_NOTIFICATION_EMAIL }}

    defaults:
      run:
        working-directory: terraform/aws-lab/envs/lab/finops

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_FINOPS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-FinOps-Plan

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Create CI backend configuration
        shell: bash
        run: |
          cat > backend-ci.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Initialize FinOps remote backend
        run: >
          terraform init
          -input=false
          -reconfigure
          -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}"
          -backend-config="key=lab/finops/terraform.tfstate"
          -backend-config="region=${{ vars.AWS_REGION }}"
          -backend-config="encrypt=true"
          -backend-config="use_lockfile=true"

      - name: Generate FinOps Terraform plan
        run: terraform plan -input=false -no-color