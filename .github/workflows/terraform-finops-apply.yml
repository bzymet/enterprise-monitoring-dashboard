name: Terraform FinOps Apply

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_VAR_budget_name: ${{ vars.FINOPS_BUDGET_NAME }}
  TF_VAR_budget_limit_amount: ${{ vars.FINOPS_BUDGET_LIMIT }}
  TF_VAR_notification_email: ${{ secrets.FINOPS_NOTIFICATION_EMAIL }}

jobs:
  terraform-finops-plan:
    name: Generate lab-finops plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/aws-lab/envs/lab/finops

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure read-only AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_FINOPS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-FinOps-Plan
          allowed-account-ids: "465556393364"

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Create CI backend configuration
        shell: bash
        run: |
          cat > backend-ci.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Initialize FinOps remote backend
        run: >
          terraform init
          -input=false
          -reconfigure
          -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}"
          -backend-config="key=lab/finops/terraform.tfstate"
          -backend-config="region=${{ vars.AWS_REGION }}"
          -backend-config="encrypt=true"
          -backend-config="use_lockfile=true"

      - name: Generate saved Terraform plan
        run: terraform plan -input=false -no-color -out=finops.tfplan

      - name: Create readable Terraform plan
        run: terraform show -no-color finops.tfplan > finops-plan.txt

      - name: Upload Terraform plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: finops-terraform-plan
          path: |
            terraform/aws-lab/envs/lab/finops/finops.tfplan
            terraform/aws-lab/envs/lab/finops/finops-plan.txt
          if-no-files-found: error
          retention-days: 7

  terraform-finops-apply:
    name: Apply approved lab-finops plan
    needs: terraform-finops-plan
    runs-on: ubuntu-latest

    environment:
      name: finops-apply

    defaults:
      run:
        working-directory: terraform/aws-lab/envs/lab/finops

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure apply AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_FINOPS_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-FinOps-Apply
          allowed-account-ids: "465556393364"

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Create CI backend configuration
        shell: bash
        run: |
          cat > backend-ci.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Initialize FinOps remote backend
        run: >
          terraform init
          -input=false
          -reconfigure
          -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}"
          -backend-config="key=lab/finops/terraform.tfstate"
          -backend-config="region=${{ vars.AWS_REGION }}"
          -backend-config="encrypt=true"
          -backend-config="use_lockfile=true"

      - name: Download approved Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: finops-terraform-plan
          path: terraform/aws-lab/envs/lab/finops

      - name: Apply approved Terraform plan
        run: terraform apply -input=false -no-color -auto-approve finops.tfplan